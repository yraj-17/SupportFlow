<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafaff" media="(prefers-color-scheme: light)" />
    <meta name="description" content="SupportDesk — Premium customer support ticketing CRM. Manage tickets, track issues, collaborate with your team." />
    <title>SupportDesk — Customer Support, Reimagined</title>
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('darkMode');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = stored !== null ? stored === 'true' : prefersDark;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
